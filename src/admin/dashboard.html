<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Proyecto Negocios</title>
    <script src="../../public/env.js"></script>
    <link rel="stylesheet" href="admin.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"><i class="ph ph-storefront"></i></div>
                <span>Admin</span>
            </div>

            <span class="sidebar-section-title">Principal</span>
            <ul class="sidebar-nav">
                <li><a href="#" class="active"><i class="ph ph-house"></i> Dashboard</a></li>
                <li>
                    <a href="#"><i class="ph ph-calendar-check"></i> Reservas
                        <span class="sidebar-badge" id="pendientes-badge" style="display:none">0</span>
                    </a>
                </li>
                <li><a href="#"><i class="ph ph-fork-knife"></i> Menú</a></li>
                <li><a href="#"><i class="ph ph-envelope-simple"></i> Contactos</a></li>
            </ul>

            <span class="sidebar-section-title">Sistema</span>
            <ul class="sidebar-nav">
                <li><a href="#"><i class="ph ph-chart-bar"></i> Analytics</a></li>
                <li><a href="#"><i class="ph ph-gear-six"></i> Configuración</a></li>
            </ul>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-avatar">A</div>
                    <div class="sidebar-user-info">
                        <span>Admin</span>
                        <small>Administrador</small>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-header-left">
                    <button class="btn btn-icon" id="sidebarToggle" style="display:none">
                        <i class="ph ph-list"></i>
                    </button>
                    <h1><i class="ph ph-squares-four"></i> Dashboard</h1>
                    <p id="currentDate"></p>
                </div>
                <div class="page-header-right">
                    <div id="conexion-status" class="connection-pill"></div>
                    <button class="btn btn-outline btn-sm" onclick="location.reload()">
                        <i class="ph ph-arrow-clockwise"></i> Refrescar
                    </button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-card-header">
                        <span class="stat-card-label">Reservas Hoy</span>
                        <div class="stat-card-icon icon-rose">
                            <i class="ph ph-calendar-blank"></i>
                        </div>
                    </div>
                    <div class="stat-card-value" id="stat-hoy">-</div>
                </div>

                <div class="stat-card">
                    <div class="stat-card-header">
                        <span class="stat-card-label">Total Reservas</span>
                        <div class="stat-card-icon icon-olive">
                            <i class="ph ph-calendar-check"></i>
                        </div>
                    </div>
                    <div class="stat-card-value" id="stat-total">-</div>
                </div>

                <div class="stat-card">
                    <div class="stat-card-header">
                        <span class="stat-card-label">Personas Hoy</span>
                        <div class="stat-card-icon icon-terra">
                            <i class="ph ph-users-three"></i>
                        </div>
                    </div>
                    <div class="stat-card-value" id="stat-personas">-</div>
                </div>

                <div class="stat-card">
                    <div class="stat-card-header">
                        <span class="stat-card-label">Visitas Menú</span>
                        <div class="stat-card-icon icon-gold">
                            <i class="ph ph-eye"></i>
                        </div>
                    </div>
                    <div class="stat-card-value" id="stat-visitas">-</div>
                </div>
            </div>

            <div class="card filters-card">
                <div class="card-body">
                    <div class="filters-row">
                        <div class="filter-search">
                            <input type="text" id="filtro-busqueda" class="form-control"
                                   placeholder="Buscar por nombre, teléfono o código...">
                        </div>
                        <select id="filtro-estado" class="form-control">
                            <option value="all">Todos los estados</option>
                            <option value="confirmada">Confirmadas</option>
                            <option value="pendiente">Pendientes</option>
                            <option value="cancelada">Canceladas</option>
                        </select>
                        <input type="date" id="filtro-fecha" class="form-control">
                        <button class="btn btn-outline btn-sm" id="btn-limpiar-filtros">
                            <i class="ph ph-x"></i> Limpiar
                        </button>
                        <button class="btn btn-primary btn-sm" id="btn-exportar">
                            <i class="ph ph-download-simple"></i> Exportar CSV
                        </button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2><i class="ph ph-list-bullets"></i> Reservas</h2>
                    <span id="tabla-info"></span>
                </div>
                <div id="reservas-table-container"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2><i class="ph ph-envelope-simple"></i> Contactos recientes</h2>
                    <span id="contactos-info"></span>
                </div>
                <div id="contactos-table-container"></div>
            </div>
        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
