<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - La Casona</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
<div class="menu-app">

    <!-- HEADER -->
    <header class="menu-header">
        <div class="header-top">
            <a href="../landing/" class="back-link">
                <i class="ph ph-arrow-left"></i>
            </a>
            <div class="header-actions">
                <button class="icon-btn" id="fabQR" aria-label="Ver código QR">
                    <i class="ph ph-qr-code"></i>
                </button>
            </div>
        </div>
        <div class="restaurant-info">
            <h1 id="restaurantName">La Casona</h1>
            <p id="restaurantDesc">Cocina mexicana tradicional</p>
        </div>
        <div class="search-bar">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Buscar platillos...">
        </div>
    </header>

    <!-- CATEGORÍAS -->
    <nav class="category-nav" id="categoryNav">
        <button class="category-btn active" data-category="all">
            Todos
        </button>
    </nav>

    <!-- FILTROS -->
    <div class="tag-filters" id="tagFilters">
        <button class="tag-btn active" data-tag="all">Todos</button>
    </div>

    <!-- MENÚ -->
    <main class="menu-content" id="menuContent">
    </main>

    <!-- MODAL DETALLE -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="itemModal">
            <button class="modal-close" id="modalClose" aria-label="Cerrar">
                <i class="ph ph-x"></i>
            </button>
            <div class="modal-image" id="modalImage"></div>
            <div class="modal-body">
                <div class="modal-tags" id="modalTags"></div>
                <h2 id="modalName"></h2>
                <p id="modalDesc"></p>
                <div class="modal-price" id="modalPrice"></div>
                <a href="#" class="btn btn-whatsapp btn-full" id="modalWhatsapp" target="_blank">
                    <i class="ph ph-whatsapp-logo"></i>
                    Pedir por WhatsApp
                </a>
            </div>
        </div>
    </div>

    <!-- QR MODAL -->
    <div class="qr-modal" id="qrModal">
        <div class="qr-content">
            <h3>Comparte este menú</h3>
            <p>Escanea el código QR o comparte el enlace</p>
            <img id="qrImage" src="" alt="Código QR del menú">
            <button class="btn btn-outline btn-full" id="closeQR">
                Cerrar
            </button>
        </div>
    </div>

    <!-- NAV INFERIOR -->
    <nav class="bottom-nav">
        <a href="../landing/" class="bottom-nav-item">
            <i class="ph ph-house"></i>
            <span>Inicio</span>
        </a>
        <a href="./" class="bottom-nav-item active">
            <i class="ph ph-fork-knife"></i>
            <span>Menú</span>
        </a>
        <a href="../reservas/" class="bottom-nav-item">
            <i class="ph ph-calendar-check"></i>
            <span>Reservar</span>
        </a>
    </nav>
</div>

<!-- SIN type="module" para compatibilidad -->
<script src="menu.js"></script>
</body>
</html>
